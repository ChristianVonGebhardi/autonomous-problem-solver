version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: drift_detection
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drift_detection"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/drift_detection
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DRIFT_ALERT_THRESHOLD: "0.65"
      STRUCTURAL_WEIGHT: "0.35"
      SEMANTIC_WEIGHT: "0.40"
      DISTRIBUTIONAL_WEIGHT: "0.25"
      EWMA_ALPHA: "0.3"
      CUSUM_THRESHOLD: "5.0"
      CUSUM_SLACK: "1.0"
      EMBEDDING_MODEL: "all-MiniLM-L6-v2"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/drift_detection
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DRIFT_ALERT_THRESHOLD: "0.65"
      STRUCTURAL_WEIGHT: "0.35"
      SEMANTIC_WEIGHT: "0.40"
      DISTRIBUTIONAL_WEIGHT: "0.25"
      EWMA_ALPHA: "0.3"
      CUSUM_THRESHOLD: "5.0"
      CUSUM_SLACK: "1.0"
      EMBEDDING_MODEL: "all-MiniLM-L6-v2"
      WORKER_POLL_INTERVAL: "2"
      WORKER_BATCH_SIZE: "10"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "http://localhost:8000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data: