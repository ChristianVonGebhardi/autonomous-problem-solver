name: Daily Problem Cycle (Steps 1 & 2)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run-steps-1-and-2:
    name: Brainstorm Problem + Design Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history so we can read all branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic PyGithub httpx python-dotenv

      - name: Run Steps 1 and 2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_DATE: ${{ github.run_id }}
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from actions_runner import run_steps_1_and_2
          run_steps_1_and_2()
          "

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
